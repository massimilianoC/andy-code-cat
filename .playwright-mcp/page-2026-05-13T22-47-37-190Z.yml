              - generic [ref=e150]: "## LAYER D — DOCUMENT CONTEXT The following materials were provided by the user as reference for this project. Use them to inform the content, copy, brand voice, and visual direction of the output. Do not reproduce raw extracted text verbatim — synthesize it into the design. ### Reference materials --- Asset: DCL Test Document Type: txt Summary: This document describes the features and objectives of the Andy Code Cat Platform, an AI-driven web design platform. Purpose: This document describes the features and objectives of the Andy Code Cat Platform, an AI-driven web design platform. Brand: Andy Code Cat Platform Tone: Professionale, innovativo, diretto Key messages: - Generare siti professionali con zero effort - Integrare Document Context Layer per enrichment automatico - Supporto multimodal AI per analisi di testo e immagini Tags: AI-driven web design, Document Context Layer, Multimodal AI support, material, Professionale, innovativo, diretto --- --- Asset: DCL Test Document Type: txt Summary: This document describes the features and objectives of the Andy Code Cat Platform, an AI-driven web design platform. Purpose: This document describes the features and objectives of the Andy Code Cat Platform, an AI-driven web design platform. Brand: Andy Code Cat Platform Tone: Professionale, innovativo, diretto Key messages: - Generare siti professionali con zero effort - Integrare Document Context Layer per enrichment automatico - Supporto multimodal AI per analisi di testo e immagini Tags: AI-driven web design, Document Context Layer, Multimodal AI support, material, Professionale, innovativo, diretto ---"
