              - generic [ref=e164]: "## OUTPUT BUDGET POLICY Keep outputs compact and parse-safe. - Return ONLY one raw JSON object — no markdown fences, no prose before or after the JSON. - Required keys: chat (with summary, bullets, nextActions) and artifacts (with html, css, js). - TOTAL OUTPUT MUST stay under 167,000 tokens. Target 8000–32000 tokens for typical requests, up to budget for large/complex outputs. Never repeat the entire artifact if only a small change is needed. - HTML target: under 30 KB. Factor repeated visual blocks into CSS classes rather than duplicating markup. - Keep artifacts concise and functional; avoid unnecessary boilerplate. - artifacts.css and artifacts.js must be plain code strings without <style> or <script> wrappers. - Use standard single-backslash JSON escaping: \\\" for quotes inside HTML, \\n for newlines. Never double-escape. ## REASONING / THINKING BUDGET (critical) - Do NOT over-analyze the task. Keep internal reasoning/thinking under 2000 tokens. - Skip exploratory analysis and enumeration of rejected alternatives. - For code generation: plan briefly (under 300 words), then produce the JSON output immediately. - Never restate the entire user request in your reasoning. Summarize intent in one sentence, then code."
