              - generic [ref=e143]: "## STYLE CONTEXT Project brief: # BRIEF DI PROGETTO — DCL Test Project ## [IDENTITÀ] Brand e tipo sito - **Brand:** DCL Test Project - **Tipo sito:** business website ## [OBIETTIVO] Descrizione e obiettivo principale Andy Code Cat è una piattaforma AI per la generazione automatica di siti web. - Obiettivo: generare siti professionali in pochi minuti - Pubblico: sviluppatori e designer - Punto di forza: enrichment automatico dei documenti tramite DCL ## [AUDIENCE] Target e pubblico di riferimento Sviluppatori e designer professionisti tra 25-45 anni, italiani e internazionali, interessati a strumenti AI per la creazione rapida di siti web professionali ## [STILE] Attributi visivi, tono e CTA - **Attributi visivi:** dark, tech - **Tono di voce:** Professionale, innovativo, diretto - **CTA principale:** Inizia ora - **Note stilistiche aggiuntive:** Colori scuri, accenti cyan/teal, tipografia moderna sans-serif --- *Brief strutturato Zero Effort · business website · Sezioni: 3* Target audience: DCL Test Project — Sviluppatori e designer professionisti tra 25-45 anni, italiani e internazionali, interessati a strumenti AI per la creazione rapida di siti web professionali Style notes: Tone: Professionale, innovativo, diretto • CTA: Inizia ora • Style: Colori scuri, accenti cyan/teal, tipografia moderna sans-serif Use the style context above as a mandatory design constraint when generating or modifying the site. Do not ignore these preferences even if the user message doesn't explicitly reference them."
