ks' class='text-dark-300 hover:text-cyan-400 transition-colors text-sm'>Come funziona</a>\\n <a href='#cta' class='px-5 py-2.5 bg-cyan-600 hover:bg-cyan-500 text-dark-950 font-semibold rounded-lg transition-all text-sm'>Inizia ora</a>\\n </nav>\\n </div>\\n </header>\\n\\n <main>\\n <section class='min-h-screen flex items-center justify-center relative overflow-hidden pt-20'>\\n <div class='absolute inset-0 bg-gradient-to-b from-cyan-500/5 via-transparent to-transparent'></div>\\n <div class='absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl'></div>\\n <div class='absolute bottom-1/4 right-1/4 w-96 h-96 bg-teal-500/10 rounded-full blur-3xl'></div>\\n \\n <div class='max-w-4xl mx-auto px-6 text-center relative z-10'>\\n <div class='gsap-hero-badge opacity-0 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-dark-800 border border-dark-700 mb-8'>\\n <span class='w-2 h-2 rounded-full bg-cyan-400 animate-pulse'></span>\\n <span class='text-dark-400 text-sm'>AI-Powered Website Generation</span>\\n </div>\\n <h1 class='gsap-hero-title opacity-0 text-5xl md:text-7xl font-bold tracking-tight mb-6 leading-tight'>\\n Crea siti web <span class='text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-teal-400'>professionali</span> in pochi minuti\\n </h1>\\n <p class='gsap-hero-sub"
