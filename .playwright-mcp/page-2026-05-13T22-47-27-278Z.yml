              - generic [ref=e32]:
                - button "Copia messaggio": Copia
                - text: "# BRIEF DI PROGETTO — DCL Test Project ## [IDENTITÀ] Brand e tipo sito - **Brand:** DCL Test Project - **Brand positioning:** Piattaforma AI innovativa per la generazione automatica di siti web - **Tipo sito:** Business Website — Landing page / Sito vetrina ## [OBIETTIVO] Descrizione e obiettivo principale **Andy Code Cat** è una piattaforma AI all'avanguardia che rivoluziona il processo di creazione di siti web professionali. - **Obiettivo primario:** Consentire agli utenti di generare siti web completi e professionali in pochi minuti, grazie alla potenza dell'intelligenza artificiale - **Proposta di valore unica:** Enrichment automatico dei documenti tramite tecnologia DCL — trasformazione instantanea di contenuti in strutture web pronte all'uso - **Beneficio chiave:** Eliminazione delle complessità tecniche, risparmio di tempo significativo, risultati immediatamente professionali ## [AUDIENCE] Target e pubblico di riferimento **Pubblico primario:** - Sviluppatori web professionisti (frontend/backend/full-stack) - Designer UX/UI e web designer - Professionisti digitali italiani e internazionali - Età: 25-45 anni - Livello esperienza: intermedio-avanzato **Profilo psicografico:** - Orientati alla tecnologia e all'innovazione - Cercano strumenti che ottimizzino i workflow di sviluppo - Apprezzano soluzioni eleganti che combinino velocità e qualità - Valutano il rapporto tempo/risultato nelle scelte tecnologiche **Bisogni e pain points:** - Necessità di accelerare i tempi di sviluppo - Frustrazione con processi ripetitivi e manuali - Desiderio di mantenere standard qualitativi elevati senza sacrificare velocità ## [MESSAGGIO] Storytelling e tono **Tono di voce:** - **Professionale:** Linguaggio chiaro, competente, autorevole - **Innovativo:** Visione futuristica, posizionamento all'avanguardia - **Diretto:** Messaggi concisi, senza fronzoli, orientati ai risultati **Claim chiave da comunicare:** - \"Genera siti professionali in minuti, non in ore\" - L'AI che trasforma i tuoi documenti in siti web completi **Struttura narrativa suggerita:** 1. Hook: Il problema — creare siti web richiede troppo tempo 2. Soluzione: Andy Code Cat e la potenza dell'AI 3. Differenziatore: L'enrichment automatico DCL 4. Prova sociale / Dimostrazione 5. CTA: Inizia ora ## [STILE] Attributi visivi, tono e CTA **Palette cromatica:** - **Primaria:** Colori scuri (nero profondo, grigio antracite, blu notte) - **Accenti:** Cyan e teal — vivaci, tecnologici, distintivi - **Contrasto:** Zone scure con elementi luminosity alta per massimizzare leggibilità e impatto visivo **Tipografia:** - Font moderni sans-serif - Clean, geometriche, leggibili - Hierarchy chiara: titoli bold, body leggero **Atmosfera visiva:** - Dark mode dominante - Estetica tech/futuristica - Elementi di profondità (gradients, shadows, glassmorphism sottile) - Accenti luminosi che suggeriscono innovazione e potenza AI **Layout e composizione:** - Struttura pulita e organizzata - Ampio uso di spazio negativo - Elementi visivi che evocano tecnologia (pattern geometrici, linee, dati) - Sezioni ben definite con transizioni fluide **CTA (Call to Action):** - **Primario:** \"Inizia ora\" - **Secondario:** \"Scopri come funziona\" / \"Demo gratuita\" - Stile: Bottone prominente, colore accent cyan/teal, contrasto elevato ## [STRUTTURA] Sezioni del sito Il sito dovrà includere le seguenti sezioni principali: 1. **Hero Section** — Headline d'impatto, sottotitolo chiaro, CTA principale, visual evocativo 2. **Feature/Benefit** — Presentazione dei punti di forza (generazione rapida, enrichment DCL, qualità professionale) 3. **Come funziona** — Spiegazione semplice e visiva del processo 4. **CTA finale** — Invito all'azione per conversions --- *Brief ottimizzato per generazione — DCL Test Project · Business Website · Target: Sviluppatori e Designer 25-45 · Tono: Professionale, Innovativo, Diretto · Style: Dark, Tech, Cyan/Teal accents*"
