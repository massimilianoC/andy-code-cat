# LOCAL DEV stack — hot-reload with bind mounts.
# Use: npm run local:dev:up / local:dev:down
# See docker-compose.deploy.yml for local prod-test builds.
name: andy-code-cat-dev

services:
  workspace:
    image: node:20-alpine
    container_name: andy-code-cat-workspace
    working_dir: /workspace
    command: ["sh", "-c", "tail -f /dev/null"]
    volumes:
      - ./:/workspace
    networks:
      - andy-code-cat-net

  mongodb:
    image: mongo:7
    container_name: andy-code-cat-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - ./data/mongodb:/data/db
    command: ["--bind_ip_all"]
    networks:
      - andy-code-cat-net

  redis:
    image: redis:7-alpine
    container_name: andy-code-cat-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - andy-code-cat-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: andy-code-cat-api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/andy-code-cat
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - workspace
      - mongodb
      - redis
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages:/workspace/packages
      - /workspace/apps/api/node_modules
      - /workspace/packages/contracts/node_modules
      - ./data:/workspace/data
    networks:
      - andy-code-cat-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: andy-code-cat-web
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NODE_ENV=development
    depends_on:
      - workspace
      - api
    ports:
      - "8081:8081"
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages:/workspace/packages
      - /workspace/apps/web/node_modules
      - /workspace/packages/contracts/node_modules
    networks:
      - andy-code-cat-net

  nginx:
    image: nginx:1.25-alpine
    container_name: andy-code-cat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Local HTTP-only config — no SSL certs needed.
      # Production SSL config lives in nginx/sites-enabled/pageforge.conf (droplet only).
      - ./nginx/sites-enabled/local.conf:/etc/nginx/sites-enabled/local.conf:ro
      - ./data/www:/var/www/andy-code-cat:ro
    depends_on:
      - api
      - web
    networks:
      - andy-code-cat-net

networks:
  andy-code-cat-net:
    driver: bridge
