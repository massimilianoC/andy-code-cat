worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Do not expose nginx version in Server header or error pages
    server_tokens off;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # --- Rate limiting zones (keyed by real client IP) ---
    # Auth endpoints: 10 requests/minute — brute-force protection
    limit_req_zone $binary_remote_addr zone=ratelimit_auth:10m rate=10r/m;
    # General API: 300 requests/minute — abuse prevention
    limit_req_zone $binary_remote_addr zone=ratelimit_api:10m rate=300r/m;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml text/plain application/json;
    gzip_min_length 1024;

    # Log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Includi tutti i virtual host dinamici (scritti da DeployWorker)
    include /etc/nginx/sites-enabled/*.conf;

    # Fallback: restituisce 404 per subdomain non configurati
    server {
        listen 80 default_server;
        server_name _;
        return 404;
    }
}
