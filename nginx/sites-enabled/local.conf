# =============================================================================
# andy-code-cat — nginx virtual host for LOCAL development / local prod-test
# =============================================================================
# HTTP only — no SSL. Works in both docker-compose.yml (hot-reload dev)
# and docker-compose.deploy.yml (prod-like local test).
#
# Upstreams:
#   web → andy-code-cat-web  :8081  (Next.js)
#   api → andy-code-cat-api  :4000  (Express)
#
# Access:
#   http://localhost/        → Next.js web app
#   http://localhost/v1/     → Express API (via nginx proxy on :80)
#   http://localhost:4000/   → Express API (direct port, bypass nginx)
#   http://localhost:8081/   → Next.js (direct port, bypass nginx)
# =============================================================================

upstream web_local {
    server web:8081;
    keepalive 8;
}

upstream api_local {
    server api:4000;
    keepalive 16;
}

# ----------------------------------------------------------------------------
# Main local server — HTTP on port 80
# Web app on / and API proxied on /v1/
# ----------------------------------------------------------------------------
server {
    listen 80;
    server_name localhost;

    # Security headers (same as production, no HSTS in local HTTP mode)
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---- API routes (/v1/*) → Express ----
    location /v1/ {
        proxy_pass         http://api_local;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
        # SSE / streaming support
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
    }

    # ---- All other routes → Next.js web ----
    location / {
        proxy_pass         http://web_local;
        proxy_http_version 1.1;
        # WebSocket / HMR support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
